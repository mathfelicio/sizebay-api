services:
  app:
    build:
      context: .
    container_name: sizebay-api-app
    depends_on:
      - postgres
    environment:
      POSTGRES_DB: sizebay
      POSTGRES_HOST: postgres
      POSTGRES_PASSWORD: root
      POSTGRES_PORT: 5432
      POSTGRES_USER: root
      NODE_ENV: development
      PORT: 3050
    volumes:
      - ./package.json:/api/package.json
      - ./nest-cli.json:/api/nest-cli.json
      - ./src:/api/src
      - ./tsconfig.json:/api/tsconfig.json
    ports:
      - "3050:3050"
    command: yarn dev
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: sizebay-api-postgres
    environment:
      POSTGRES_PASSWORD: root
      POSTGRES_USER: root
      POSTGRES_DB: sizebay
    ports:
      - "5438:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
